name: A股每日收盘复盘

on:
  schedule:
    # 北京时间 16:30 → UTC 8:30
    # 不再提前补偿GitHub延迟，脚本内置15:30时间保护防止提前运行
    - cron: "30 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: 执行收盘复盘
        run: python market_review.py
        env:
          TZ: Asia/Shanghai
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}

      - name: 部署报告到 Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          destination_dir: reports
          keep_files: true
