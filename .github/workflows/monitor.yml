name: 自选股盘中监控

on:
  schedule:
        # 北京时间 10:30, 14:30 → UTC 2:30, 6:30
        # 不再提前补偿GitHub延迟，脚本内置交易时段保护(9:20-15:10)
    - cron: "30 2,6 * * 1-5"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python market_monitor.py
        env:
          TZ: Asia/Shanghai
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
