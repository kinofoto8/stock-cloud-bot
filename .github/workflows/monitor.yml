name: 自选股盘中监控

on:
  schedule:
        # 北京时间 9:30, 12:30 → UTC 1:30, 4:30
        # (提前触发补偿GitHub Actions cron 2-3h延迟，实际运行约10:30/14:30)
    - cron: "30 1,4 * * 1-5"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python market_monitor.py
        env:
          TZ: Asia/Shanghai
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
